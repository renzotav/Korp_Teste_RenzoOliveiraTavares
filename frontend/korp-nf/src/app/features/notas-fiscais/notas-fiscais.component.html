<mat-card>
  <mat-card-header>
    <mat-card-title>Nova Nota Fiscal</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="criarNota()" style="margin-top: 16px">
      <div formArrayName="itens">
        <div
          *ngFor="let item of itens.controls; let i = index"
          [formGroupName]="i"
          style="display: flex; gap: 16px; align-items: center; margin-bottom: 12px"
        >
          <mat-form-field style="flex: 1">
            <mat-label>Produto</mat-label>
            <select matNativeControl formControlName="produtoId">
              <option value="">Selecione...</option>
              <option *ngFor="let p of produtos" [value]="p.id">
                {{ p.codigo }} — {{ p.descricao }} (saldo: {{ p.saldo }})
              </option>
            </select>
          </mat-form-field>

          <mat-form-field style="width: 120px">
            <mat-label>Quantidade</mat-label>
            <input matInput type="number" formControlName="quantidade" min="1" />
          </mat-form-field>

          <button mat-icon-button color="warn" type="button" (click)="removerItem(i)">
            <mat-icon>remove_circle</mat-icon>
          </button>
        </div>
      </div>

      <div style="display: flex; gap: 8px; margin-top: 8px">
        <button mat-stroked-button type="button" (click)="adicionarItem()">
          <mat-icon>add</mat-icon> Adicionar Item
        </button>
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
          Criar Nota
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>

<mat-card style="margin-top: 24px">
  <mat-card-header>
    <mat-card-title>Notas Fiscais</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div *ngIf="carregando" style="display: flex; justify-content: center; padding: 32px">
      <mat-spinner diameter="40" />
    </div>

    <table mat-table [dataSource]="notas" *ngIf="!carregando" style="width: 100%">
      <ng-container matColumnDef="numero">
        <th mat-header-cell *matHeaderCellDef>Número</th>
        <td mat-cell *matCellDef="let n">{{ n.numero }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let n">
          <mat-chip [color]="n.status === 'Aberta' ? 'primary' : 'warn'" highlighted>
            {{ n.status }}
          </mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="itens">
        <th mat-header-cell *matHeaderCellDef>Itens</th>
        <td mat-cell *matCellDef="let n">
          <span *ngFor="let item of n.itens">
            {{ nomeProduto(item.produtoId) }} ({{ item.quantidade }})&nbsp;
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let n">
          <button
            mat-raised-button
            color="primary"
            [disabled]="n.status !== 'Aberta' || imprimindo === n.id"
            (click)="imprimir(n.id!)"
            style="margin-right: 8px"
          >
            <mat-spinner *ngIf="imprimindo === n.id" diameter="20" style="display: inline-block" />
            <mat-icon *ngIf="imprimindo !== n.id">print</mat-icon>
            Imprimir
          </button>

          <button
            mat-icon-button
            color="warn"
            [disabled]="n.status === 'Fechada'"
            (click)="deletar(n.id!)"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="colunas"></tr>
      <tr mat-row *matRowDef="let row; columns: colunas"></tr>
    </table>
  </mat-card-content>
</mat-card>
